<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Подтверждение email — prAIm</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            color: #f0f0f0;
            background: #121320;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .verify-container {
            background: #15161e;
            padding: 40px;
            border-radius: 30px;
            box-shadow: 0 0 30px rgba(139, 61, 240, 0.15);
            width: 90%;
            max-width: 420px;
            text-align: center;
        }
        h1 {
            background: linear-gradient(135deg, #ff5fa3, #ff2e93, #8b3df0);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            margin-bottom: 20px;
        }
        .status-message {
            padding: 16px;
            border-radius: 12px;
            margin: 16px 0;
        }
        .status-loading {
            color: rgba(255,255,255,0.7);
        }
        .status-success {
            background: rgba(34, 197, 94, 0.15);
            color: #22c55e;
            border: 1px solid rgba(34, 197, 94, 0.3);
        }
        .status-error {
            background: rgba(239, 68, 68, 0.15);
            color: #ef4444;
            border: 1px solid rgba(239, 68, 68, 0.3);
        }
        .status-already {
            background: rgba(59, 130, 246, 0.15);
            color: #3b82f6;
            border: 1px solid rgba(59, 130, 246, 0.3);
        }
        a {
            color: #8b5cf6;
            text-decoration: none;
            display: inline-block;
            margin-top: 16px;
        }
        a:hover {
            color: #3b9eff;
        }
        .spinner {
            width: 32px;
            height: 32px;
            border: 3px solid rgba(139, 92, 246, 0.2);
            border-top-color: #8b5cf6;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin: 16px auto;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="verify-container">
        <h1>Подтверждение email</h1>
        <div id="statusMessage" class="status-message status-loading">
            <div class="spinner"></div>
            <p>Проверяем ваш токен...</p>
        </div>
        <a href="login.html">Перейти к входу</a>
    </div>
    <script src="verify.js"></script>
</body>
</html>
