<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Главное меню — VideoStream</title>
    <link rel="stylesheet" href="central.css">
</head>
<body>

<div class="app-container">
    <!-- ВЕРХНЯЯ ПОЛОСКА: юзернейм + поиск + логотип -->
    <div class="top-bar">
        <div class="logo-icon">
            <img src="logo.png" alt="Логотип" onerror="this.onerror=null; this.src='https://placehold.co/32x32/2c3e66/white?text=🎬';">
            <span class="logo-text">prAIm</span>
        </div>
        <div class="search-wrapper">
            <input type="text" class="search-input" id="globalSearch" placeholder="Поиск фильмов, сериалов, жанров...">
        </div>
        <div class="user-greeting" id="userNameDisplay">
            6767676767676767
        </div>
    </div>

    <!-- БАННЕР НА  ВСЮ ШИРИНУ (НЕ ИНТЕРАКТИВНЫЙ) -->
    <div class="hero-banner">
        <img src= 'assets/images/add.png' alt="Баннер" onerror="this.onerror=null; this.src='https://placehold.co/1600x400/1f2a48/white?text=';">
    </div>

    <!-- СЕКЦИЯ КАТЕГОРИЙ С ГОРИЗОНТАЛЬНОЙ ПРОКРУТКОЙ -->
    <div class="categories-section">
        <div class="section-header">
            <h2>Категории</h2>
            <div class="scroll-controls">
                <button class="scroll-btn" id="scrollLeftCategories" aria-label="Прокрутить влево">←</button>
                <button class="scroll-btn" id="scrollRightCategories" aria-label="Прокрутить вправо">→</button>
            </div>
        </div>

        <div class="categories-track" id="categoriesTrack">
            <div class="categories-flex" id="categoriesFlex"></div>
        </div>
    </div>

    <!-- СЕКЦИЯ ПОПУЛЯРНОЕ С ГОРИЗОНТАЛЬНОЙ ПРОКРУТКОЙ -->
    <div class="categories-section">
        <div class="section-header">
            <h2>Популярное</h2>
            <div class="scroll-controls">
                <button class="scroll-btn" id="scrollLeftPopular" aria-label="Прокрутить влево">←</button>
                <button class="scroll-btn" id="scrollRightPopular" aria-label="Прокрутить вправо">→</button>
            </div>
        </div>

        <div class="categories-track" id="popularTrack">
            <div class="categories-flex" id="popularFlex"></div>
        </div>
    </div>
</div>

<script src="topbar.js"></script>
<script src="central.js"></script>
</body>
</html>
