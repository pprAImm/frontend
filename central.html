<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Главное меню — VideoStream</title>
    <link rel="stylesheet" href="central.css">
</head>
<body>

<div class="app-container">
    <!-- ВЕРХНЯЯ ПОЛОСКА: логотип + поиск + профиль -->
    <div class="top-bar">
        <div class="logo-icon">
            <img src="assets/images/ppraimm_logo.png" alt="ppraimm">
            <span class="logo-text">prAIm</span>
        </div>
        <div class="search-wrapper">
            <input type="text" class="search-input" id="globalSearch" placeholder="Поиск фильмов, сериалов, жанров...">
        </div>
        <div class="user-greeting" id="userNameDisplay">
            guest
        </div>
    </div>

    <!-- БАННЕР -->
    <div class="hero-banner">
        <img src= 'assets/images/add.png' alt="Баннер" onerror="this.onerror=null; this.src='https://placehold.co/1600x400/1f2a48/white?text=';">
    </div>

    <!-- СЕКЦИЯ КАТЕГОРИЙ -->
    <div class="categories-section">
        <div class="section-header">
            <h2>Категории</h2>
            <div class="scroll-controls">
                <button class="scroll-btn" id="catScrollLeft">←</button>
                <button class="scroll-btn" id="catScrollRight">→</button>
            </div>
        </div>
        <div class="categories-track" id="categoriesTrack">
            <div class="categories-flex" id="categoriesContainer"></div>
        </div>
    </div>

    <!-- СЕКЦИЯ ПОПУЛЯРНОЕ -->
    <div class="categories-section">
        <div class="section-header">
            <h2>Популярное</h2>
        </div>
        <div class="series-grid" id="seriesContainer"></div>
    </div>
</div>

<script src="topbar.js"></script>
<script src="central.js"></script>
</body>
</html>
