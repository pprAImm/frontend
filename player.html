<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Плеер — prAIm</title>
    <link rel="stylesheet" href="player.css">
</head>
<body>
<div class="player-container">
    <div class="player-topbar">
        <button class="player-close" id="playerClose">✕</button>
        <span class="player-title" id="playerTitle">Сериал</span>
    </div>

    <div class="player-video-wrapper">
        <video id="playerVideo" class="player-video"></video>
        <div class="player-error" id="playerError" style="display:none;">
            <span>Видео не найдено</span>
        </div>
    </div>

    <div class="player-controls">
        <div class="controls-main">
            <button class="control-btn" id="prevBtn" title="Предыдущая серия">⏮</button>
            <button class="control-btn play-btn" id="playBtn" title="Воспроизвести / Пауза">▶</button>
            <button class="control-btn" id="nextBtn" title="Следующая серия">⏭</button>
        </div>

        <div class="controls-volume">
            <span class="volume-icon">🔊</span>
            <input type="range" class="volume-slider" id="volumeSlider" min="0" max="1" step="0.05" value="1">
        </div>

        <div class="controls-speed">
            <span class="speed-label" id="speedLabel">1x</span>
            <div class="speed-menu" id="speedMenu">
                <button class="speed-option" data-speed="0.5">0.5x</button>
                <button class="speed-option" data-speed="0.75">0.75x</button>
                <button class="speed-option active" data-speed="1">1x</button>
                <button class="speed-option" data-speed="1.25">1.25x</button>
                <button class="speed-option" data-speed="1.5">1.5x</button>
                <button class="speed-option" data-speed="1.75">1.75x</button>
                <button class="speed-option" data-speed="2">2x</button>
            </div>
        </div>
    </div>

    <div class="player-progress">
        <span class="player-time" id="currentTime">0:00</span>
        <div class="progress-track" id="progressTrack">
            <div class="progress-fill" id="progressFill"></div>
        </div>
        <span class="player-time" id="totalTime">0:00</span>
    </div>
</div>

<script src="player.js"></script>
</body>
</html>
