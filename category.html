<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Категория — prAIm</title>
    <link rel="stylesheet" href="central.css">
</head>
<body>
<div class="app-container">
    <div class="top-bar">
        <div class="logo-icon">
            <img src="logo.png" alt="Логотип" onerror="this.onerror=null; this.src='https://placehold.co/32x32/2c3e66/white?text=🎬';">
            <span class="logo-text">prAIm</span>
        </div>
        <div class="search-wrapper">
            <input type="text" class="search-input" id="globalSearch" placeholder="Поиск фильмов, сериалов, жанров...">
        </div>
        <div class="user-greeting" id="userNameDisplay">6767676767676767</div>
    </div>

    <section class="category-hero">
        <div class="category-hero-inner">
            <span class="category-badge" id="categoryBadge">Категория</span>
            <h1 id="categoryTitle">Название категории</h1>
            <p id="categoryDescription">Список фильмов и сериалов, относящихся к выбранной категории.</p>
        </div>
    </section>

    <section class="movies-section">
        <div class="section-header">
            <h2>Фильмы и сериалы</h2>
        </div>
        <div class="movies-grid" id="moviesGrid"></div>
    </section>
</div>
<script src="topbar.js"></script>
<script src="category.js"></script>
</body>
</html>
