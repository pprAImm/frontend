<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Поиск сериалов — prAIm</title>
    <link rel="stylesheet" href="central.css">
</head>
<body>
<div class="app-container">
    <div class="top-bar">
        <div class="logo-icon">
            <img src="assets/images/ppraimm_logo.png" alt="ppraimm">
            <span class="logo-text">prAIm</span>
        </div>
        <div class="search-wrapper" style="display:flex; gap:12px;">
            <input type="text" class="search-input" id="searchInput" placeholder="Поиск фильмов, сериалов, жанров..." style="flex:1;">
            <button id="searchBtn" class="search-btn-large">🔍 Поиск</button>
        </div>
        <div class="user-greeting" id="userNameDisplay">guest</div>
    </div>

    <section class="search-section">
        <div class="section-header">
            <h2>Результаты поиска</h2>
        </div>
        <div id="resultsCount" class="results-count"></div>
        <div id="resultsGrid" class="series-grid"></div>
        <div id="noResults" class="no-results" style="display:none;">
            <p>Сериалы не найдены. Попробуйте другое название.</p>
        </div>
        <div id="searchError" class="no-results" style="display:none;">
            <p>Ошибка при поиске. Проверьте подключение к серверу.</p>
        </div>
    </section>

    <section class="search-section" id="initialSection">
        <div class="section-header">
            <h2>Популярные сериалы</h2>
        </div>
        <div id="initialGrid" class="series-grid"></div>
    </section>
</div>

<script src="topbar.js"></script>
<script src="search.js"></script>
</body>
</html>
